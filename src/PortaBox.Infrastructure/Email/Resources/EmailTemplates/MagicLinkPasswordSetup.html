<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Defina sua senha</title>
</head>
<body style="font-family: Arial, sans-serif; color: #0b2b47; line-height: 1.6;">
  <p>Olá, {nome}.</p>
  <p>Seu acesso ao condomínio <strong>{nome_condominio}</strong> está quase pronto.</p>
  <p>Para definir sua senha inicial, acesse o link abaixo:</p>
  <p><a href="{link}">{link}</a></p>
  <p>Se você não solicitou este acesso, ignore esta mensagem.</p>
</body>
</html>
