<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>PortaBox — Porter App</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  body { margin:0; background: var(--bg-app); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
  .stage { display:flex; gap:32px; align-items:center; flex-wrap:wrap; justify-content:center; }
  .controls { display:flex; flex-direction:column; gap:10px; }
  .controls button { font-family: var(--font-display); font-weight:600; font-size:13px; padding:10px 14px; border-radius:10px; border:1px solid var(--border-default); background:white; cursor:pointer; text-align:left; min-width:180px; }
  .controls button.active { background: var(--pb-navy-700); color:white; border-color: var(--pb-navy-700); }
  h1 { margin:0 0 4px; font-size:24px; }
  .caption { font-family: var(--font-mono); font-size:11px; color: var(--fg-muted); }
</style>
</head>
<body>
<div class="stage">
  <div class="controls">
    <h1>Porter App</h1>
    <div class="caption">PortaBox Capture · pt-BR</div>
    <div style="height:10px"></div>
    <button data-s="home" class="active">Início (home)</button>
    <button data-s="capture">Capturar etiqueta</button>
    <button data-s="confirm">Confirmar OCR</button>
    <button data-s="retrieve">Retirar (PIN)</button>
    <button data-s="history">Histórico</button>
  </div>
  <div id="device-mount"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="porter-screens.jsx"></script>

<script type="text/babel">
  const { useState } = React;
  function App() {
    const [screen, setScreen] = useState('home');
    React.useEffect(() => {
      const btns = document.querySelectorAll('.controls button');
      btns.forEach(b => {
        b.onclick = () => {
          btns.forEach(x => x.classList.remove('active'));
          b.classList.add('active');
          setScreen(b.dataset.s);
        };
      });
    }, []);
    let content;
    if (screen === 'home') content = <HomeScreen onNav={setScreen} />;
    else if (screen === 'capture') content = <CaptureScreen onNav={setScreen} />;
    else if (screen === 'confirm') content = <ConfirmScreen onNav={setScreen} />;
    else if (screen === 'retrieve') content = <RetrieveScreen onNav={setScreen} />;
    else content = <HistoryScreen />;

    const activeTab = ['capture','confirm'].includes(screen) ? 'capture' : screen === 'retrieve' ? 'retrieve' : screen === 'history' ? 'history' : 'home';

    return (
      <IOSDevice width={390} height={844}>
        <div style={{ position:'absolute', inset:0, overflow:'hidden' }}>
          {content}
          <PorterTabBar active={activeTab} onChange={setScreen} />
        </div>
      </IOSDevice>
    );
  }
  ReactDOM.createRoot(document.getElementById('device-mount')).render(<App />);
</script>
</body>
</html>
