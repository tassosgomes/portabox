<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-app);}
  .wrap{padding:24px 28px;display:flex;gap:10px;align-items:flex-end;}
  .tok{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .box{background:var(--pb-orange-500);border-radius:4px;}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);}
  .val{font-family:var(--font-mono);font-size:10px;color:var(--pb-navy-900);font-weight:600;}
</style></head>
<body>
<div class="wrap">
  <div class="tok"><div class="box" style="width:4px;height:4px"></div><div class="lbl">sp-1</div><div class="val">4</div></div>
  <div class="tok"><div class="box" style="width:8px;height:8px"></div><div class="lbl">sp-2</div><div class="val">8</div></div>
  <div class="tok"><div class="box" style="width:12px;height:12px"></div><div class="lbl">sp-3</div><div class="val">12</div></div>
  <div class="tok"><div class="box" style="width:16px;height:16px"></div><div class="lbl">sp-4</div><div class="val">16</div></div>
  <div class="tok"><div class="box" style="width:20px;height:20px"></div><div class="lbl">sp-5</div><div class="val">20</div></div>
  <div class="tok"><div class="box" style="width:24px;height:24px"></div><div class="lbl">sp-6</div><div class="val">24</div></div>
  <div class="tok"><div class="box" style="width:32px;height:32px"></div><div class="lbl">sp-8</div><div class="val">32</div></div>
  <div class="tok"><div class="box" style="width:40px;height:40px"></div><div class="lbl">sp-10</div><div class="val">40</div></div>
  <div class="tok"><div class="box" style="width:48px;height:48px"></div><div class="lbl">sp-12</div><div class="val">48</div></div>
  <div class="tok"><div class="box" style="width:64px;height:64px"></div><div class="lbl">sp-16</div><div class="val">64</div></div>
</div>
</body></html>
