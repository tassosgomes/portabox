<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-app);}
  .wrap{padding:22px 28px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .sw{border-radius:var(--r-md);overflow:hidden;box-shadow:var(--sh-sm);}
  .chip{height:84px;}
  .meta{padding:10px 12px;background:var(--bg-surface);}
  .name{font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--pb-navy-900);letter-spacing:-0.01em;}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--fg-muted);margin-top:2px;}
  .role{font-family:var(--font-mono);font-size:10px;color:var(--fg-subtle);margin-top:2px;}
</style></head>
<body>
<div class="wrap">
  <div class="sw"><div class="chip" style="background:#0B2B47"></div><div class="meta"><div class="name">Navy 900</div><div class="hex">#0B2B47</div><div class="role">chrome, hero bg</div></div></div>
  <div class="sw"><div class="chip" style="background:#1E3A8A"></div><div class="meta"><div class="name">Navy 700</div><div class="hex">#1E3A8A</div><div class="role">primary brand, headings</div></div></div>
  <div class="sw"><div class="chip" style="background:#F97316"></div><div class="meta"><div class="name">Orange 500</div><div class="hex">#F97316</div><div class="role">primary CTA, energy</div></div></div>
</div>
</body></html>
