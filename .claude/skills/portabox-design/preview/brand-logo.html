<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-app);}
  .wrap{padding:24px 28px;display:flex;align-items:center;gap:22px;}
  img{height:110px;width:auto;display:block;}
  .col{display:flex;flex-direction:column;gap:4px;}
  .name{font-family:var(--font-display);font-weight:800;font-size:22px;color:var(--pb-navy-900);letter-spacing:-0.02em;}
  .tag{font-family:var(--font-display);font-weight:600;font-size:12px;color:var(--pb-navy-700);letter-spacing:-0.01em;}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);margin-top:8px;}
</style></head>
<body>
<div class="wrap">
  <img src="../assets/logo-portabox.png" alt="PortaBox">
  <div class="col">
    <div class="name">PortaBox</div>
    <div class="tag">Logística Interna Simplificada</div>
    <div class="meta">horizontal lockup · full color · light bg</div>
  </div>
</div>
</body></html>
