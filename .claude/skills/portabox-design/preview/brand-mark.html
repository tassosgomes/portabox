<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-app);}
  .wrap{padding:16px;display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:12px;}
  .mark{border-radius:14px;display:flex;align-items:center;justify-content:center;height:160px;padding:18px;}
  .a{background:#F9FAFB;box-shadow:inset 0 0 0 1px var(--border-default);}
  .b{background:#1E3A8A;}
  .c{background:#F97316;}
  .a img.full{height:86px;width:auto;}
  .a img.mark{height:110px;width:auto;}
  .b img, .c img{height:110px;width:auto;filter:brightness(0) invert(1);}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);text-align:center;margin-top:6px;letter-spacing:.04em;text-transform:uppercase;}
</style></head>
<body>
<div class="wrap">
  <div><div class="mark a"><img class="full" src="../assets/logo-portabox-full.svg" alt="PortaBox"></div><div class="lbl">full lockup · on paper</div></div>
  <div><div class="mark b"><img src="../assets/logo-portabox-mark.svg" alt="PortaBox mark"></div><div class="lbl">mark · knockout on navy</div></div>
  <div><div class="mark c"><img src="../assets/logo-portabox-mark.svg" alt="PortaBox mark"></div><div class="lbl">mark · knockout on orange</div></div>
</div>
</body></html>
