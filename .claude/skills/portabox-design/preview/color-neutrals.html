<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-app);}
  .wrap{padding:22px 28px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .sw{border-radius:var(--r-md);overflow:hidden;box-shadow:var(--sh-sm);background:var(--bg-surface);}
  .chip{height:74px;}
  .meta{padding:9px 11px;}
  .name{font-family:var(--font-display);font-weight:700;font-size:12px;color:var(--pb-navy-900);letter-spacing:-0.01em;}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);margin-top:2px;}
</style></head>
<body>
<div class="wrap">
  <div class="sw"><div class="chip" style="background:#F9FAFB;box-shadow:inset 0 0 0 1px var(--border-default);"></div><div class="meta"><div class="name">Paper</div><div class="hex">#F9FAFB</div></div></div>
  <div class="sw"><div class="chip" style="background:#E0E7FF"></div><div class="meta"><div class="name">Ice 100</div><div class="hex">#E0E7FF</div></div></div>
  <div class="sw"><div class="chip" style="background:#E0D3F1"></div><div class="meta"><div class="name">Lilac 100</div><div class="hex">#E0D3F1</div></div></div>
  <div class="sw"><div class="chip" style="background:#D1D5DB"></div><div class="meta"><div class="name">Gray 200</div><div class="hex">#D1D5DB</div></div></div>
  <div class="sw"><div class="chip" style="background:#9CA3AF"></div><div class="meta"><div class="name">Gray 400</div><div class="hex">#9CA3AF</div></div></div>
  <div class="sw"><div class="chip" style="background:#6B7280"></div><div class="meta"><div class="name">Gray 500</div><div class="hex">#6B7280</div></div></div>
  <div class="sw"><div class="chip" style="background:#4B5563"></div><div class="meta"><div class="name">Navy 500</div><div class="hex">#4B5563</div></div></div>
  <div class="sw"><div class="chip" style="background:#1F2937"></div><div class="meta"><div class="name">Ink 900</div><div class="hex">#1F2937</div></div></div>
</div>
</body></html>
