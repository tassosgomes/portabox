<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-app);}
  .wrap{padding:24px 28px;display:flex;gap:22px;align-items:center;}
  .tok{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box{width:70px;height:50px;background:var(--pb-navy-700);}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);}
  .val{font-family:var(--font-display);font-weight:700;font-size:12px;color:var(--pb-navy-900);}
</style></head>
<body>
<div class="wrap">
  <div class="tok"><div class="box" style="border-radius:4px"></div><div class="val">r-xs</div><div class="lbl">4 · chips</div></div>
  <div class="tok"><div class="box" style="border-radius:6px"></div><div class="val">r-sm</div><div class="lbl">6</div></div>
  <div class="tok"><div class="box" style="border-radius:10px"></div><div class="val">r-md</div><div class="lbl">10 · inputs</div></div>
  <div class="tok"><div class="box" style="border-radius:14px"></div><div class="val">r-lg</div><div class="lbl">14 · cards</div></div>
  <div class="tok"><div class="box" style="border-radius:20px"></div><div class="val">r-xl</div><div class="lbl">20 · hero</div></div>
  <div class="tok"><div class="box" style="border-radius:999px;background:var(--pb-orange-500)"></div><div class="val">r-pill</div><div class="lbl">∞ · CTA</div></div>
</div>
</body></html>
