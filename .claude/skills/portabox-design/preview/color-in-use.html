<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-app);}
  .wrap{padding:24px 28px;display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .demo{border-radius:var(--r-lg);padding:22px;color:white;position:relative;overflow:hidden;}
  .eye{font-family:var(--font-display);font-weight:800;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;opacity:.7;margin-bottom:10px;}
  .big{font-family:var(--font-display);font-weight:800;font-size:22px;letter-spacing:-0.02em;line-height:1.1;}
  .btn{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:8px 14px;border-radius:999px;background:#F97316;color:white;font-family:var(--font-display);font-weight:700;font-size:12px;}
</style></head>
<body>
<div class="wrap">
  <div class="demo" style="background:#0B2B47;">
    <div class="eye">Chrome · Navy 900</div>
    <div class="big">Painel da portaria</div>
    <div class="btn">Registrar encomenda →</div>
  </div>
  <div class="demo" style="background:#1E3A8A;">
    <div class="eye">Brand · Navy 700</div>
    <div class="big">Logística interna</div>
    <div class="btn">Ver dashboard →</div>
  </div>
</div>
</body></html>
