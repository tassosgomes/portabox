<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-app);}
  .card{padding:22px 28px;display:flex;align-items:center;gap:32px;}
  .pin{font-family:var(--font-mono);font-weight:700;font-size:56px;letter-spacing:0.18em;color:var(--pb-navy-900);}
  .col{display:flex;flex-direction:column;gap:6px;}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--fg-muted);}
  .id{font-family:var(--font-mono);font-size:14px;color:var(--fg-default);letter-spacing:0.02em;}
</style></head>
<body>
<div class="card">
  <div class="col">
    <span class="eyebrow" style="color:var(--fg-muted);">PIN</span>
    <div class="pin">4829</div>
  </div>
  <div class="col" style="padding-left:28px;border-left:1px solid var(--border-default);">
    <span class="meta">Package ID</span>
    <span class="id">PB-2026-00341</span>
    <span class="meta" style="margin-top:6px;">OCR raw</span>
    <span class="id" style="color:var(--fg-muted);">APR7-55 / NAPMGA0DUNA</span>
  </div>
</div>
</body></html>
