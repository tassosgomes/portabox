<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-app);}
  .wrap{padding:24px 28px;}
  .card{background:white;border-radius:14px;box-shadow:var(--sh-md);padding:16px 18px;display:flex;align-items:center;gap:14px;}
  .thumb{width:54px;height:54px;border-radius:10px;background:#FEF3E9 linear-gradient(135deg,#FEF3E9,#FED7AA);display:flex;align-items:center;justify-content:center;color:#EA580C;font-family:var(--font-display);font-weight:800;font-size:20px;}
  .body{flex:1;display:flex;flex-direction:column;gap:2px;}
  .title{font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--pb-navy-900);}
  .sub{font-family:var(--font-mono);font-size:11px;color:var(--fg-muted);}
  .right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
  .pin{font-family:var(--font-mono);font-weight:700;font-size:18px;letter-spacing:0.15em;color:var(--pb-navy-900);}
  .badge{padding:3px 9px;border-radius:999px;font-family:var(--font-display);font-weight:700;font-size:10px;background:#FFEDD5;color:#9A3412;}
</style></head>
<body>
<div class="wrap">
  <div class="card">
    <div class="thumb">📦</div>
    <div class="body">
      <div class="title">Apto 0701 · João M.</div>
      <div class="sub">Amazon · hoje, 14:32 · prateleira 3</div>
    </div>
    <div class="right">
      <div class="pin">4829</div>
      <span class="badge">Aguardando</span>
    </div>
  </div>
</div>
</body></html>
