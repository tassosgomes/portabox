<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#E5DDD5;}
  .wrap{padding:22px 28px;display:flex;justify-content:center;}
  .bubble{background:white;border-radius:14px 14px 14px 4px;padding:12px 14px;max-width:360px;box-shadow:0 1px 1px rgba(0,0,0,.1);font-family:var(--font-body);font-size:14px;color:#111;line-height:1.45;}
  .hdr{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
  .name{font-family:var(--font-body);font-weight:600;font-size:13px;color:#075E54;}
  .time{font-family:var(--font-body);font-size:10.5px;color:#8696a0;margin-left:auto;}
  .avatar{width:22px;height:22px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:700;}
  .pin{font-weight:700;letter-spacing:0.1em;}
</style></head>
<body>
<div class="wrap">
  <div class="bubble">
    <div class="hdr"><div class="avatar">P</div><div class="name">Olá, João</div><div class="time">now</div></div>
    <div>Olá, João! 📦 Chegou uma encomenda para você aqui na portaria. Para retirar, basta informar este PIN ao porteiro: <span class="pin">4829</span>. Te esperamos!</div>
  </div>
</div>
</body></html>
