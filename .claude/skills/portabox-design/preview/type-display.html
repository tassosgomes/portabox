<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-app);}
  .card{padding:24px 28px;display:flex;flex-direction:column;gap:8px;}
  .row{display:flex;align-items:baseline;gap:18px;}
  .label{font-family:var(--font-mono);font-size:11px;color:var(--fg-muted);min-width:180px;}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle);}
</style></head>
<body>
<div class="card">
  <div class="row"><span class="label">Display / UI — Plus Jakarta Sans</span><span class="meta">600–800 · -2% tracking</span></div>
  <div style="font-family:var(--font-display);font-weight:800;font-size:56px;letter-spacing:-0.02em;color:var(--pb-navy-900);line-height:1.05;">Logística&nbsp;simplificada.</div>
  <div style="font-family:var(--font-display);font-weight:700;font-size:22px;color:var(--pb-navy-700);">Cada encomenda, rastreável do portão ao morador.</div>
</div>
</body></html>
