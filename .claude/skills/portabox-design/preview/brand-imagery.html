<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-app);}
  .wrap{padding:18px 20px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  .ph{aspect-ratio:4/3;border-radius:12px;background-size:cover;background-position:center;box-shadow:var(--sh-sm);}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);margin-top:6px;}
</style></head>
<body>
<div class="wrap">
  <div><div class="ph" style="background-image:url(../assets/img-porter-desk.png)"></div><div class="lbl">porter at desk · warm daylight</div></div>
  <div><div class="ph" style="background-image:url(../assets/img-delivery-handoff.png)"></div><div class="lbl">handoff moment · real condo</div></div>
  <div><div class="ph" style="background-image:url(../assets/img-resident-whatsapp.png)"></div><div class="lbl">resident in home · notification</div></div>
</div>
</body></html>
