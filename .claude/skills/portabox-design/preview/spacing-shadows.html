<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-app);}
  .wrap{padding:28px;display:grid;grid-template-columns:repeat(4,1fr);gap:20px;}
  .card{background:white;border-radius:14px;padding:18px 16px;min-height:90px;display:flex;flex-direction:column;justify-content:flex-end;}
  .name{font-family:var(--font-display);font-weight:700;font-size:12px;color:var(--pb-navy-900);}
  .use{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);margin-top:2px;}
</style></head>
<body>
<div class="wrap">
  <div class="card" style="box-shadow:var(--sh-xs)"><div class="name">sh-xs</div><div class="use">inputs</div></div>
  <div class="card" style="box-shadow:var(--sh-sm)"><div class="name">sh-sm</div><div class="use">chips, lifts</div></div>
  <div class="card" style="box-shadow:var(--sh-md)"><div class="name">sh-md</div><div class="use">cards</div></div>
  <div class="card" style="box-shadow:var(--sh-lg)"><div class="name">sh-lg</div><div class="use">modals, toasts</div></div>
</div>
</body></html>
