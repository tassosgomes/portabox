<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-app);}
  .card{padding:22px 28px;display:grid;grid-template-columns:140px 1fr;gap:12px 20px;align-items:baseline;}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--fg-muted);}
</style></head>
<body>
<div class="card">
  <span class="meta">Body / 16</span>
  <p style="margin:0;font-size:16px;color:var(--fg-default);">Fotografe as etiquetas no seu ritmo. A IA extrai número do apartamento, nome do morador e transportadora automaticamente.</p>
  <span class="meta">Small / 14</span>
  <p style="margin:0;font-size:14px;color:var(--fg-default);">14:32 · registrada por João M. · Amazon Prime</p>
  <span class="meta">Caption / 12</span>
  <p style="margin:0;font-size:12px;color:var(--fg-muted);">Armazenada na prateleira 3 · notificação enviada</p>
  <span class="meta">Eyebrow</span>
  <span class="eyebrow">TOKEN DE RETIRADA</span>
</div>
</body></html>
