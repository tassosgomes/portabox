<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-app);}
  .wrap{padding:22px 28px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .lbl{font-family:var(--font-display);font-weight:600;font-size:12px;color:var(--pb-navy-900);}
  input{font-family:var(--font-body);font-size:15px;padding:11px 14px;border-radius:10px;border:1px solid var(--border-default);background:white;outline:none;color:var(--fg-default);}
  input.focus{border-color:var(--pb-orange-500);box-shadow:0 0 0 3px rgba(249,115,22,.25);}
  input.error{border-color:var(--pb-danger);}
  .hint{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);}
  .err{font-family:var(--font-body);font-size:12px;color:var(--pb-danger);}
</style></head>
<body>
<div class="wrap">
  <div class="field"><span class="lbl">Apartamento</span><input value="0701" /><span class="hint">default</span></div>
  <div class="field"><span class="lbl">Morador</span><input class="focus" value="João M." /><span class="hint">focused</span></div>
  <div class="field"><span class="lbl">Transportadora</span><input placeholder="Amazon, Mercado Livre…" /><span class="hint">empty w/ placeholder</span></div>
  <div class="field"><span class="lbl">PIN informado</span><input class="error" value="1234" /><span class="err">PIN não confere</span></div>
</div>
</body></html>
