<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-app);}
  .wrap{padding:22px 28px;display:flex;gap:22px;align-items:center;}
  .frame{width:240px;height:300px;border-radius:20px;background:#F9FAFB;box-shadow:inset 0 0 0 2px rgba(11,43,71,.08);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
  .guide{position:absolute;inset:30px;border:2px dashed var(--pb-orange-500);border-radius:14px;}
  .label-card{background:white;padding:16px 18px;border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,.08);font-family:var(--font-mono);font-size:11px;line-height:1.4;color:#333;}
  .barcode{height:22px;background:repeating-linear-gradient(90deg,#000 0 2px,transparent 2px 3px,#000 3px 5px,transparent 5px 7px);margin-top:6px;}
  .check{width:44px;height:44px;border-radius:50%;background:var(--pb-success);color:white;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;}
  .col{display:flex;flex-direction:column;gap:10px;align-items:flex-start;}
  .eye{font-family:var(--font-display);font-weight:800;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--pb-orange-500);}
  .txt{font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--pb-navy-900);max-width:220px;line-height:1.3;}
</style></head>
<body>
<div class="wrap">
  <div class="frame">
    <div class="guide"></div>
    <div class="label-card"><div style="font-weight:700">APT 07-01</div><div>João Mendes</div><div class="barcode"></div></div>
  </div>
  <div class="col">
    <div class="check">✓</div>
    <div class="eye">OCR Capture Frame</div>
    <div class="txt">Moldura tracejada em laranja guia o porteiro. Check verde confirma extração pela IA.</div>
  </div>
</div>
</body></html>
