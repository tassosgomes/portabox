name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: "8.0.x"
  NODE_VERSION: "20"

jobs:
  # ─── .NET: unit + integration tests ────────────────────────────────────────
  dotnet-tests:
    name: .NET Tests (unit + integration)
    runs-on: ubuntu-latest

    services:
      docker:
        image: docker:dind
        options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore PortaBox.sln

      - name: Build
        run: dotnet build PortaBox.sln --no-restore -c Release

      - name: Unit tests
        run: |
          dotnet test tests/PortaBox.Api.UnitTests/PortaBox.Api.UnitTests.csproj \
            --no-build -c Release --logger "trx;LogFileName=unit-results.trx" \
            /p:CollectCoverage=true /p:CoverletOutputFormat=opencover \
            /p:CoverletOutput=../../artifacts/coverage/unit/
          dotnet test tests/PortaBox.Modules.Gestao.UnitTests/PortaBox.Modules.Gestao.UnitTests.csproj \
            --no-build -c Release --logger "trx;LogFileName=unit-gestao-results.trx" \
            /p:CollectCoverage=true /p:CoverletOutputFormat=opencover \
            /p:CoverletOutput=../../artifacts/coverage/unit-gestao/

      - name: Integration tests (sequential — shared Testcontainers)
        run: |
          dotnet test tests/PortaBox.Api.IntegrationTests/PortaBox.Api.IntegrationTests.csproj \
            --no-build -c Release \
            --logger "trx;LogFileName=integration-results.trx" \
            /p:CollectCoverage=true /p:CoverletOutputFormat=opencover \
            /p:CoverletOutput=../../artifacts/coverage/integration/ \
            -- xunit.parallelizeAssembly=false xunit.maxParallelThreads=1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: "**/*.trx"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-coverage
          path: artifacts/coverage/

  # ─── Frontend: build + vitest ───────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests (vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check generated API types
        run: pnpm --filter @portabox/api-client check:generated

      - name: Build api-client
        run: pnpm --filter @portabox/api-client build

      - name: Build packages/ui
        run: pnpm --filter @portabox/ui build

      - name: Test api-client
        run: pnpm --filter @portabox/api-client test

      - name: Test backoffice
        run: pnpm --filter @portabox/backoffice test

      - name: Test sindico
        run: pnpm --filter @portabox/sindico test

      - name: Build backoffice (for Playwright reuse)
        run: pnpm --filter @portabox/backoffice build

      - name: Copy functions/ into backoffice dist
        run: cp -R apps/backoffice/functions apps/backoffice/dist/functions

      - name: Upload backoffice build
        uses: actions/upload-artifact@v4
        with:
          name: backoffice-dist
          path: apps/backoffice/dist/

      - name: Build sindico
        run: pnpm --filter @portabox/sindico build

      - name: Copy functions/ into sindico dist
        run: cp -R apps/sindico/functions apps/sindico/dist/functions

      - name: Upload sindico build
        uses: actions/upload-artifact@v4
        with:
          name: sindico-dist
          path: apps/sindico/dist/

  # ─── Playwright E2E smoke ────────────────────────────────────────────────────
  playwright-smoke:
    name: Playwright Smoke (E2E)
    runs-on: ubuntu-latest
    needs: [dotnet-tests, frontend-tests]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: portabox_e2e
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 3s --health-retries 10

      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
          MINIO_DEFAULT_BUCKETS: portabox-e2e
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl -sf http://localhost:9000/minio/health/live" --health-interval 5s --health-retries 10

      mailhog:
        image: mailhog/mailhog:v1.0.1
        ports:
          - 1025:1025
          - 8025:8025

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Download backoffice build
        uses: actions/download-artifact@v4
        with:
          name: backoffice-dist
          path: apps/backoffice/dist/

      - name: Install root + e2e deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @portabox/e2e exec playwright install --with-deps chromium

      - name: Start API
        env:
          ConnectionStrings__Postgres: "Host=localhost;Port=5432;Database=portabox_e2e;Username=postgres;Password=postgres"
          Storage__Provider: Minio
          Storage__Endpoint: "http://localhost:9000"
          Storage__BucketName: portabox-e2e
          Storage__AccessKey: minioadmin
          Storage__SecretKey: minioadmin
          Storage__UseSsl: "false"
          Storage__ForcePathStyle: "true"
          Storage__Region: us-east-1
          Email__Host: localhost
          Email__Port: "1025"
          Email__UseSsl: "false"
          DomainEvents__Publisher__Enabled: "false"
          CondominioMagicLink__SindicoAppBaseUrl: "http://localhost:4173"
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: "http://localhost:5000"
        run: |
          dotnet run --project src/PortaBox.Api/PortaBox.Api.csproj -c Release --no-build &
          echo "Waiting for API..."
          until curl -sf http://localhost:5000/health/live; do sleep 2; done
          echo "API ready."

      - name: Start backoffice preview
        run: |
          pnpm --filter @portabox/backoffice preview --port 4173 &
          until curl -sf http://localhost:4173; do sleep 1; done
          echo "Backoffice ready."

      - name: Run Playwright smoke
        env:
          PLAYWRIGHT_API_URL: "http://localhost:5000"
          PLAYWRIGHT_APP_URL: "http://localhost:4173"
          CI: "true"
        run: pnpm --filter @portabox/e2e e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/

  # ─── Cloudflare Pages deploy ────────────────────────────────────────────────
  deploy-backoffice:
    name: Deploy Backoffice (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: [dotnet-tests, frontend-tests, playwright-smoke]
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || (github.ref == 'refs/heads/develop' && 'staging' || 'preview') }}
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download backoffice build
        uses: actions/download-artifact@v4
        with:
          name: backoffice-dist
          path: apps/backoffice/dist/

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/backoffice/dist --project-name=portabox-backoffice --branch=${{ github.head_ref || github.ref_name }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: backoffice-preview
          message: |
            **Backoffice preview:** ${{ steps.deploy.outputs.deployment-url }}
            Commit: `${{ github.event.pull_request.head.sha }}`

  deploy-sindico:
    name: Deploy Sindico (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: [dotnet-tests, frontend-tests, playwright-smoke]
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || (github.ref == 'refs/heads/develop' && 'staging' || 'preview') }}
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download sindico build
        uses: actions/download-artifact@v4
        with:
          name: sindico-dist
          path: apps/sindico/dist/

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/sindico/dist --project-name=portabox-sindico --branch=${{ github.head_ref || github.ref_name }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: sindico-preview
          message: |
            **Síndico preview:** ${{ steps.deploy.outputs.deployment-url }}
            Commit: `${{ github.event.pull_request.head.sha }}`
