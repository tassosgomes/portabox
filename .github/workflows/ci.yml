name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: "8.0.x"
  NODE_VERSION: "20"

jobs:
  # ─── .NET: unit + integration tests ────────────────────────────────────────
  dotnet-tests:
    name: .NET Tests (unit + integration)
    runs-on: ubuntu-latest

    services:
      docker:
        image: docker:dind
        options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore PortaBox.sln

      - name: Build
        run: dotnet build PortaBox.sln --no-restore -c Release

      - name: Unit tests
        run: |
          dotnet test tests/PortaBox.Api.UnitTests/PortaBox.Api.UnitTests.csproj \
            --no-build -c Release --logger "trx;LogFileName=unit-results.trx" \
            /p:CollectCoverage=true /p:CoverletOutputFormat=opencover \
            /p:CoverletOutput=../../artifacts/coverage/unit/
          dotnet test tests/PortaBox.Modules.Gestao.UnitTests/PortaBox.Modules.Gestao.UnitTests.csproj \
            --no-build -c Release --logger "trx;LogFileName=unit-gestao-results.trx" \
            /p:CollectCoverage=true /p:CoverletOutputFormat=opencover \
            /p:CoverletOutput=../../artifacts/coverage/unit-gestao/

      - name: Integration tests (sequential — shared Testcontainers)
        run: |
          dotnet test tests/PortaBox.Api.IntegrationTests/PortaBox.Api.IntegrationTests.csproj \
            --no-build -c Release \
            --logger "trx;LogFileName=integration-results.trx" \
            /p:CollectCoverage=true /p:CoverletOutputFormat=opencover \
            /p:CoverletOutput=../../artifacts/coverage/integration/ \
            -- xunit.parallelizeAssembly=false xunit.maxParallelThreads=1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: "**/*.trx"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-coverage
          path: artifacts/coverage/

  # ─── Frontend: build + vitest ───────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests (vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check generated API types
        run: pnpm --filter @portabox/api-client check:generated

      - name: Build api-client
        run: pnpm --filter @portabox/api-client build

      - name: Build packages/ui
        run: pnpm --filter @portabox/ui build

      - name: Test api-client
        run: pnpm --filter @portabox/api-client test

      - name: Test backoffice
        run: pnpm --filter @portabox/backoffice test

      - name: Test sindico
        run: pnpm --filter @portabox/sindico test

      - name: Build backoffice
        run: pnpm --filter @portabox/backoffice build

      - name: Copy functions/ into backoffice dist
        run: cp -R apps/backoffice/functions apps/backoffice/dist/functions

      - name: Upload backoffice build
        uses: actions/upload-artifact@v4
        with:
          name: backoffice-dist
          path: apps/backoffice/dist/

      - name: Build sindico
        run: pnpm --filter @portabox/sindico build

      - name: Copy functions/ into sindico dist
        run: cp -R apps/sindico/functions apps/sindico/dist/functions

      - name: Upload sindico build
        uses: actions/upload-artifact@v4
        with:
          name: sindico-dist
          path: apps/sindico/dist/

  # ─── Cloudflare Pages deploy ────────────────────────────────────────────────
  # TODO: Adicionar workflow separado de E2E que rode Playwright contra a URL
  # de preview do Cloudflare Pages apos cada deploy, em vez de duplicar a
  # stack (Postgres + MinIO + MailHog + API .NET) aqui.
  deploy-backoffice:
    name: Deploy Backoffice (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: [dotnet-tests, frontend-tests]
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || (github.ref == 'refs/heads/develop' && 'staging' || 'preview') }}
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download backoffice build
        uses: actions/download-artifact@v4
        with:
          name: backoffice-dist
          path: apps/backoffice/dist/

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: npm
          command: pages deploy apps/backoffice/dist --project-name=portabox-backoffice --branch=${{ github.head_ref || github.ref_name }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: backoffice-preview
          message: |
            **Backoffice preview:** ${{ steps.deploy.outputs.deployment-url }}
            Commit: `${{ github.event.pull_request.head.sha }}`

  deploy-sindico:
    name: Deploy Sindico (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: [dotnet-tests, frontend-tests]
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || (github.ref == 'refs/heads/develop' && 'staging' || 'preview') }}
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download sindico build
        uses: actions/download-artifact@v4
        with:
          name: sindico-dist
          path: apps/sindico/dist/

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: npm
          command: pages deploy apps/sindico/dist --project-name=portabox-sindico --branch=${{ github.head_ref || github.ref_name }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: sindico-preview
          message: |
            **Síndico preview:** ${{ steps.deploy.outputs.deployment-url }}
            Commit: `${{ github.event.pull_request.head.sha }}`
